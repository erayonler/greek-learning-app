  {
    id: 1, title: "Η οικογένειά μου", titleTr: "Ailem", level: "A1", icon: "👨‍👩‍👧‍👦", color: "#E91E63",
    paragraphs: [
      { gr: "Γεια σας! Με λένε Μαρία και είμαι από την Αθήνα. Σήμερα θέλω να σας μιλήσω για την οικογένειά μου.", pron: "Ya sas! Me lene Maria ke ime apo tin Athina. Simera thelo na sas miliso ya tin ikoyenia mu.", tr: "Merhaba! Benim adım Maria ve Atina'danım. Bugün size ailemden bahsetmek istiyorum." },
      { gr: "Ο πατέρας μου λέγεται Γιώργος. Είναι πενήντα χρονών και δουλεύει σε μία τράπεζα. Είναι πολύ καλός άνθρωπος.", pron: "O pateras mu leyete Yorgos. İne peninda hronon ke dulevi se mia trapeza. İne poli kalos anthropos.", tr: "Babamın adı Yorgos. Elli yaşında ve bir bankada çalışıyor. Çok iyi bir insan." },
      { gr: "Η μητέρα μου λέγεται Ελένη. Είναι σαράντα πέντε χρονών. Είναι δασκάλα σε ένα σχολείο. Μαγειρεύει πολύ νόστιμα!", pron: "İ mitera mu leyete Eleni. İne saranda pende hronon. İne daskala se ena sholio. Mayirevi poli nostima!", tr: "Annemin adı Eleni. Kırk beş yaşında. Bir okulda öğretmen. Çok lezzetli yemek yapıyor!" },
      { gr: "Έχω έναν αδελφό και μία αδελφή. Ο αδελφός μου λέγεται Νίκος και είναι είκοσι χρονών. Σπουδάζει ιατρική. Η αδελφή μου λέγεται Άννα και είναι δεκαέξι χρονών. Πηγαίνει ακόμα στο σχολείο.", pron: "Eho enan adelfo ke mia adelfi. O adelfos mu leyete Nikos ke ine ikosi hronon. Spudazi iatriki. İ adelfi mu leyete Anna ke ine dekaeksi hronon. Piyeni akoma sto sholio.", tr: "Bir erkek ve bir kız kardeşim var. Erkek kardeşimin adı Nikos ve yirmi yaşında. Tıp okuyor. Kız kardeşimin adı Anna ve on altı yaşında. Hâlâ okula gidiyor." },
      { gr: "Κάθε Κυριακή τρώμε μαζί το μεσημεριανό. Η γιαγιά και ο παππούς έρχονται στο σπίτι μας. Τρώμε, μιλάμε και γελάμε. Αγαπώ πολύ την οικογένειά μου!", pron: "Kathe Kiriaki trome mazi to mesimeriano. İ yiayia ke o papus erhonde sto spiti mas. Trome, milame ke yelame. Agapo poli tin ikoyenia mu!", tr: "Her pazar birlikte öğle yemeği yiyoruz. Büyükanne ve büyükbaba evimize geliyor. Yiyoruz, konuşuyoruz ve gülüyoruz. Ailemi çok seviyorum!" },
    ]

    paragraphs: [
      { gr: "Πέρυσι το καλοκαίρι πήγα στη Σαντορίνη με τους φίλους μου. Ήταν το πρώτο μου ταξίδι σε ελληνικό νησί και ήμουν πολύ ενθουσιασμένος.", pron: "Perisi to kalokeri piga sti Sandorini me tus filus mu. İtan to proto mu taksidi se eliniko nisi ke imun poli enthusiasménos.", tr: "Geçen yaz arkadaşlarımla Santorini'ye gittim. Bir Yunan adasına ilk yolculuğumdu ve çok heyecanlıydım." },
      { gr: "Πήραμε το πλοίο από τον Πειραιά. Το ταξίδι διήρκεσε περίπου πέντε ώρες. Στο πλοίο είδαμε τη θάλασσα, φάγαμε σάντουιτς και ήπιαμε καφέ.", pron: "Pirame to plio apo ton Pirea. To taksidi diirkese peripu pende ores. Sto plio idame ti thalasa, fagame sandwich ke ipiame kafe.", tr: "Pire'den feribota bindik. Yolculuk yaklaşık beş saat sürdü. Feribotta denizi gördük, sandviç yedik ve kahve içtik." },
      { gr: "Όταν φτάσαμε στη Σαντορίνη, μείναμε άφωνοι. Τα άσπρα σπίτια, οι μπλε θόλοι, η απίστευτη θέα! Ήταν σαν καρτ ποστάλ.", pron: "Otan ftasame sti Sandorini, miname afoni. Ta aspra spitia, i ble tholi, i apistefti thea! İtan san kart postal.", tr: "Santorini'ye vardığımızda ağzımız açık kaldı. Beyaz evler, mavi kubbeler, inanılmaz manzara! Kartpostal gibiydi." },
      { gr: "Μείναμε σε ένα μικρό ξενοδοχείο στην Οία. Το δωμάτιο είχε θέα στην καλντέρα. Κάθε βράδυ βλέπαμε το ηλιοβασίλεμα από το μπαλκόνι. Ήταν μαγικό!", pron: "Miname se ena mikro ksenodohio stin Oia. To domatio ihe thea stin kaldera. Kathe vradi vlepame to iliovasilema apo to balkoni. İtan mayiko!", tr: "Oia'da küçük bir otelde kaldık. Odanın kalderaya manzarası vardı. Her akşam balkondan gün batımını seyrettik. Büyüleyiciydi!" },
      { gr: "Φάγαμε φρέσκο ψάρι στις ταβέρνες, κολυμπήσαμε στην Κόκκινη Παραλία και περπατήσαμε στα στενά δρομάκια. Η Σαντορίνη είναι πραγματικά ένας παράδεισος!", pron: "Fagame fresko psari stis tavernes, kolimpisame stin Kokini Paralia ke perpatisame sta stena dromakia. İ Sandorini ine pragmatika enas paradisos!", tr: "Tavernalarda taze balık yedik, Kırmızı Plaj'da yüzdük ve dar sokaklarda yürüdük. Santorini gerçekten bir cennet!" },
      { gr: "Θα επιστρέψω σίγουρα! Ίσως την επόμενη φορά να πάω και στη Μύκονο ή στην Κρήτη. Η Ελλάδα έχει τόσα πολλά όμορφα νησιά!", pron: "Tha epistrepso sigura! İsos tin epomeni fora na pao ke sti Mikono i stin Kriti. İ Elada ehi tosa pola omorfa nisia!", tr: "Kesinlikle geri döneceğim! Belki bir dahaki sefere Mikonos'a veya Girit'e de giderim. Yunanistan'ın çok güzel adaları var!" },

  {

    paragraphs: [
      { gr: "Ξυπνάω κάθε μέρα στις επτά το πρωί. Πρώτα πίνω έναν καφέ και τρώω πρωινό. Συνήθως τρώω γιαούρτι με μέλι και φρούτα.", pron: "Ksipnao kathe mera stis epta to proi. Prota pino enan kafe ke troo proino. Sinithos troo yaúrti me meli ke fruta.", tr: "Her gün sabah yedide uyanıyorum. Önce bir kahve içiyorum ve kahvaltı yapıyorum. Genellikle ballı yoğurt ve meyve yiyorum." },
      { gr: "Στις οκτώ παίρνω το μετρό για τη δουλειά. Δουλεύω σε μία εταιρεία τεχνολογίας στο κέντρο της Αθήνας. Είμαι προγραμματιστής.", pron: "Stis okto perno to metro ya ti dulia. Dulevo se mia eteria tehnoloyias sto kentro tis Athinas. İme programatistis.", tr: "Sekizde işe gitmek için metroya biniyorum. Atina merkezinde bir teknoloji şirketinde çalışıyorum. Programcıyım." },
      { gr: "Το γραφείο μου είναι στον πέμπτο όροφο. Έχω έναν υπολογιστή, ένα τηλέφωνο και πολλά βιβλία. Οι συνάδελφοί μου είναι πολύ φιλικοί.", pron: "To grafio mu ine ston pempto orofo. Eho enan ipoloyisti, ena tilefono ke pola vivlia. İ sinadelfí mu ine poli filiki.", tr: "Ofisim beşinci katta. Bir bilgisayarım, bir telefonum ve çok kitabım var. İş arkadaşlarım çok arkadaş canlısı." },
      { gr: "Στις δώδεκα κάνουμε διάλειμμα για μεσημεριανό. Μερικές φορές τρώω στην καντίνα, αλλά συνήθως πηγαίνω σε ένα εστιατόριο κοντά στο γραφείο.", pron: "Stis dodeka kanume dialima ya mesimeriano. Merikes fores troo stin kandina, ala sinithos piyeno se ena estiatorio konda sto grafio.", tr: "On ikide öğle yemeği molası veriyoruz. Bazen kantinde yiyorum ama genellikle ofisin yakınındaki bir restorana gidiyorum." },
      { gr: "Τελειώνω τη δουλειά στις πέντε. Μετά πηγαίνω στο γυμναστήριο ή περπατάω στο πάρκο. Το βράδυ μαγειρεύω, βλέπω τηλεόραση και διαβάζω ένα βιβλίο.", pron: "Teliono ti dulia stis pende. Meta piyeno sto yimnastirio i perpato sto parko. To vradi mayirevo, vlepo tileorasi ke diavazo ena vivlio.", tr: "İşi beşte bitiriyorum. Sonra spor salonuna gidiyorum veya parkta yürüyorum. Akşam yemek yapıyorum, televizyon izliyorum ve kitap okuyorum." },
    ]
  },
  {
    id: 4, title: "Ελληνική κουζίνα", titleTr: "Yunan Mutfağı", level: "A2-B1", icon: "🍳", color: "#8BC34A",
    paragraphs: [
      { gr: "Η ελληνική κουζίνα είναι μία από τις πιο υγιεινές στον κόσμο. Βασίζεται στη μεσογειακή διατροφή: λαχανικά, ελαιόλαδο, ψάρι, όσπρια και φρέσκα φρούτα.", pron: "İ eliniki kuzina ine mia apo tis pio iyiinés ston kozmo. Vasizete sti mesoyiaki diatrofi: lahanika, eleolado, psari, ospria ke freska fruta.", tr: "Yunan mutfağı dünyanın en sağlıklı mutfaklarından biridir. Akdeniz diyetine dayanır: sebzeler, zeytinyağı, balık, baklagiller ve taze meyveler." },
      { gr: "Το ελαιόλαδο είναι η βάση της ελληνικής κουζίνας. Οι Έλληνες χρησιμοποιούν ελαιόλαδο σχεδόν σε κάθε φαγητό. Λένε ότι είναι «υγρός χρυσός»!", pron: "To eleolado ine i vasi tis elinikis kuzinas. İ Elines hrisimopiyun eleolado shedon se kathe fayito. Lene oti ine «igros hrisos»!", tr: "Zeytinyağı Yunan mutfağının temelidir. Yunanlılar neredeyse her yemekte zeytinyağı kullanır. «Sıvı altın» olduğunu söylerler!" },
      { gr: "Μερικά διάσημα ελληνικά φαγητά: η μουσακάς (με μελιτζάνες και κιμά), το σουβλάκι (κρέας στη σχάρα), η χωριάτικη σαλάτα (με φέτα και ελιές) και το τζατζίκι.", pron: "Merika diasima elinika fayita: i musakas (me melidzanes ke kima), to suvlaki (kreas sti shara), i horiatiki salata (me feta ke elies) ke to dzadziki.", tr: "Bazı ünlü Yunan yemekleri: musakka (patlıcan ve kıyma ile), souvlaki (ızgara et), köy salatası (beyaz peynir ve zeytin ile) ve cacık." },
      { gr: "Οι Έλληνες τρώνε αργά. Το μεσημεριανό είναι συνήθως στις δύο ή τρεις το μεσημέρι. Το βραδινό μπορεί να είναι στις εννιά ή δέκα το βράδυ! Τρώνε αργά γιατί απολαμβάνουν το φαγητό και τη συντροφιά.", pron: "İ Elines trone arga. To mesimeriano ine sinithos stis dio i tris to mesimeri. To vradino bori na ine stis enia i deka to vradi! Trone arga yati apolamvanun to fayito ke ti sindrofia.", tr: "Yunanlılar geç yer. Öğle yemeği genellikle öğleden sonra iki veya üçtedir. Akşam yemeği akşam dokuz veya onda olabilir! Geç yerler çünkü yemeğin ve arkadaşlığın tadını çıkarırlar." },

  {
    id: 5, title: "Η ιστορία της Αθήνας", titleTr: "Atina'nın Tarihi", level: "B1", icon: "🏛️", color: "#9C27B0",
    paragraphs: [
      { gr: "Η Αθήνα είναι μία από τις αρχαιότερες πόλεις του κόσμου. Η ιστορία της ξεκινάει πριν από περίπου 3.400 χρόνια. Πήρε το όνομά της από τη θεά Αθηνά, τη θεά της σοφίας.", pron: "İ Athina ine mia apo tis arheoteres polis tu kozmu. İ istoria tis ksekinai prin apo peripu 3.400 hronia. Pire to onoma tis apo ti thea Athina, ti thea tis sofias.", tr: "Atina dünyanın en eski şehirlerinden biridir. Tarihi yaklaşık 3.400 yıl önce başlar. Adını bilgelik tanrıçası Athena'dan almıştır." },
      { gr: "Τον 5ο αιώνα π.Χ., η Αθήνα ήταν το κέντρο του δυτικού πολιτισμού. Εκείνη την εποχή έζησαν μεγάλοι φιλόσοφοι όπως ο Σωκράτης, ο Πλάτωνας και ο Αριστοτέλης.", pron: "Ton pempto eona p.H., i Athina itan to kentro tu ditikou politizmu. Ekini tin epohi ezisan megali filosofi opos o Sokratis, o Platonas ke o Aristotelis.", tr: "MÖ 5. yüzyılda Atina, Batı uygarlığının merkeziydi. O dönemde Sokrates, Platon ve Aristoteles gibi büyük filozoflar yaşadı." },
      { gr: "Η Ακρόπολη χτίστηκε τον 5ο αιώνα π.Χ. Ο Παρθενώνας, ο ναός της Αθηνάς, είναι το πιο διάσημο μνημείο. Κάθε χρόνο εκατομμύρια τουρίστες επισκέπτονται την Ακρόπολη.", pron: "İ Akropoli htistike ton pempto eona p.H. O Parthenonas, o naos tis Athinas, ine to pio diasimo mnimio. Kathe hrono ekatomiria turistes episkeptonde tin Akropoli.", tr: "Akropolis MÖ 5. yüzyılda inşa edildi. Athena'nın tapınağı Parthenon en ünlü anıttır. Her yıl milyonlarca turist Akropolis'i ziyaret eder." },
      { gr: "Η Αθήνα ήταν επίσης η γενέτειρα της δημοκρατίας. Η λέξη «δημοκρατία» είναι ελληνική: δήμος (λαός) + κράτος (εξουσία) = εξουσία του λαού.", pron: "İ Athina itan episis i yenetira tis dimokratias. İ leksi «dimokratia» ine eliniki: dimos (laos) + kratos (eksusia) = eksusia tu lau.", tr: "Atina aynı zamanda demokrasinin doğum yeriydi. «Demokrasi» kelimesi Yunancadır: demos (halk) + kratos (iktidar) = halkın iktidarı." },
      { gr: "Σήμερα η Αθήνα είναι μια σύγχρονη ευρωπαϊκή πρωτεύουσα με περίπου 4 εκατομμύρια κατοίκους. Συνδυάζει την αρχαία ιστορία με τη σύγχρονη ζωή. Μπορείτε να δείτε αρχαίους ναούς δίπλα σε μοντέρνα κτίρια!", pron: "Simera i Athina ine mia sighoni evropaiki protevusa me peripu 4 ekatomiria katikus. Sindiazi tin arhea istoria me ti sighoni zoi. Borite na dite arheus naus dipla se moderna ktiria!", tr: "Bugün Atina, yaklaşık 4 milyon nüfuslu modern bir Avrupa başkentidir. Antik tarihi modern yaşamla birleştirir. Antik tapınakları modern binaların yanında görebilirsiniz!" },
    ]
  },
  {
    id: 6, title: "Τουρκία και Ελλάδα: Γείτονες", titleTr: "Türkiye ve Yunanistan: Komşular", level: "B1", icon: "🤝", color: "#607D8B",
    paragraphs: [

function App() {
  const [view, setView] = useState("home");
  const [activeWeek, setActiveWeek] = useState(null);

  const [showTr, setShowTr] = useState({});
  const [showPron, setShowPron] = useState(true);
  const [searchTerm, setSearchTerm] = useState("");
  const [selectedCategory, setSelectedCategory] = useState("all");
  const [flashcardMode, setFlashcardMode] = useState(false);
  const [currentCard, setCurrentCard] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);

  const week = WEEKS.find((w) => w.id === activeWeek);
  const article = ARTICLES.find((a) => a.id === activeArticle);
  const toggleTr = (key) => setShowTr((prev) => ({ ...prev, [key]: !prev[key] }));

  const allVocabulary = useMemo(() => {
    const vocab = [];
    WEEKS.forEach(w => {
      w.vocabulary.forEach(v => vocab.push({ ...v, weekId: w.id }));
      if (w.numbers) w.numbers.forEach(n => vocab.push({ ...n, category: "sayilar", weekId: w.id }));
    });
    return vocab;
  }, []);

  const filteredVocabulary = useMemo(() => {
    return allVocabulary.filter(v => {
      const matchesSearch = searchTerm === "" || v.gr.toLowerCase().includes(searchTerm.toLowerCase()) || v.tr.toLowerCase().includes(searchTerm.toLowerCase()) || v.pron.toLowerCase().includes(searchTerm.toLowerCase());
      const matchesCategory = selectedCategory === "all" || v.category === selectedCategory;
      return matchesSearch && matchesCategory;
    });
  }, [allVocabulary, searchTerm, selectedCategory]);

  const categories = useMemo(() => { const cats = new Set(); allVocabulary.forEach(v => v.category && cats.add(v.category)); return Array.from(cats); }, [allVocabulary]);

  const nextCard = () => { setShowAnswer(false); setCurrentCard((prev) => (prev + 1) % filteredVocabulary.length); };
  const prevCard = () => { setShowAnswer(false); setCurrentCard((prev) => (prev - 1 + filteredVocabulary.length) % filteredVocabulary.length); };

  // HOME VIEW
  if (view === "home") {
    return (
      <div style={{ fontFamily: "'Crimson Pro', Georgia, serif", background: "linear-gradient(160deg, #0D3B66 0%, #0a2540 50%, #051b30 100%)", minHeight: "100vh", color: "#fff", padding: 0 }}>

            <p style={{ fontSize: 14, opacity: 0.75 }}>6 Haftalık Pratik Seyahat Yunancası</p>
          </div>

              🔤 Alfabe
            </button>
            <button onClick={() => setView("dictionary")} style={{ padding: "14px", background: "linear-gradient(135deg, #FFD54F, #FFA000)", border: "none", borderRadius: 12, cursor: "pointer", fontSize: 14, fontWeight: 700, color: "#333" }}>
              📚 Sözlük
            </button>
          </div>

          <button onClick={() => setView("library")} style={{ width: "100%", padding: "16px", marginBottom: 20, background: "linear-gradient(135deg, #4CAF50, #388E3C)", border: "none", borderRadius: 12, cursor: "pointer", fontSize: 15, fontWeight: 700, color: "#fff" }}>
            📖 Okuma Kütüphanesi ({ARTICLES.length} makale)
          </button>

          <h2 style={{ fontSize: 15, margin: "0 0 12px", fontWeight: 600, textAlign: "center" }}>Haftalık Dersler</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {WEEKS.map((w) => (
              <button key={w.id} onClick={() => { setActiveWeek(w.id); setView("week"); setActiveTab("vocab"); setShowTr({}); }} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, cursor: "pointer", textAlign: "left", color: "#fff", borderLeft: `4px solid ${w.color}` }}>
                <span style={{ fontSize: 24 }}>{w.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 10, opacity: 0.45, textTransform: "uppercase" }}>{w.id}. Hafta</div>
                  <div style={{ fontSize: 15, fontWeight: 700 }}>{w.title}</div>
                  <div style={{ fontSize: 11, opacity: 0.6 }}>{w.subtitle}</div>
                </div>
                <span style={{ opacity: 0.3 }}>→</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ALPHABET VIEW
  if (view === "alphabet") {
    return (
      <div style={{ fontFamily: "'Crimson Pro', Georgia, serif", background: "#081e36", minHeight: "100vh", color: "#e0dbd2" }}>
        <div style={{ background: "linear-gradient(135deg, #9C27B0, #7B1FA2)", padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 10 }}>
          <button onClick={() => setView("home")} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>← Geri</button>
          <span style={{ fontSize: 22 }}>🔤</span>
          <div><div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>Yunan Alfabesi</div><div style={{ fontSize: 11, opacity: 0.8, color: "#fff" }}>24 harf</div></div>
        </div>
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "18px 14px 40px" }}>
          <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "16px", marginBottom: 20 }}>
            <h3 style={{ margin: "0 0 10px", fontSize: 14 }}>Önemli Notlar:</h3>
            <ul style={{ margin: 0, paddingLeft: 20, fontSize: 13, lineHeight: 1.8, opacity: 0.8 }}>
              <li><strong>Σ/σ/ς</strong> — Sigma kelime sonunda <strong>ς</strong> olur</li>
              <li><strong>Γ/γ</strong> — "e, i" önünde "y" gibi, diğer yerlerde "g" gibi</li>
              <li><strong>Η, Ι, Υ</strong> — Hepsi "i" sesi verir</li>
              <li><strong>Ο, Ω</strong> — İkisi de "o" sesi verir</li>
            </ul>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 10 }}>
            {ALPHABET.map((letter, i) => (
              <div key={i} onClick={() => toggleTr(`alph${i}`)} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: "14px", cursor: "pointer", border: showTr[`alph${i}`] ? "2px solid #9C27B0" : "2px solid transparent", transition: "all 0.2s" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 32, fontWeight: 700, color: "#9C27B0" }}>{letter.upper}</span>
                  <span style={{ fontSize: 32, fontWeight: 700, opacity: 0.6 }}>{letter.lower}</span>
                </div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{letter.name}</div>
                <div style={{ fontSize: 12, opacity: 0.5 }}>Okunuş: <strong>{letter.pron}</strong></div>
                {showTr[`alph${i}`] && <div style={{ fontSize: 11, color: "#FFD54F", marginTop: 8, paddingTop: 8, borderTop: "1px solid rgba(255,255,255,0.1)" }}>{letter.example}</div>}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // LIBRARY VIEW
  if (view === "library") {
    return (
      <div style={{ fontFamily: "'Crimson Pro', Georgia, serif", background: "#081e36", minHeight: "100vh", color: "#e0dbd2" }}>
        <div style={{ background: "linear-gradient(135deg, #4CAF50, #388E3C)", padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 10 }}>
          <button onClick={() => setView("home")} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>← Geri</button>
          <span style={{ fontSize: 22 }}>📖</span>
          <div><div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>Okuma Kütüphanesi</div><div style={{ fontSize: 11, opacity: 0.8, color: "#fff" }}>{ARTICLES.length} makale</div></div>
        </div>
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "18px 14px 40px" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {ARTICLES.map((a) => (
              <button key={a.id} onClick={() => { setActiveArticle(a.id); setView("article"); setShowTr({}); }} style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, cursor: "pointer", textAlign: "left", color: "#fff", borderLeft: `4px solid ${a.color}` }}>
                <span style={{ fontSize: 32 }}>{a.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 10, opacity: 0.5, textTransform: "uppercase", marginBottom: 2 }}>Seviye: {a.level}</div>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>{a.title}</div>
                  <div style={{ fontSize: 13, opacity: 0.7 }}>{a.titleTr}</div>
                  <div style={{ fontSize: 11, opacity: 0.4, marginTop: 4 }}>{a.paragraphs.length} paragraf</div>
                </div>
                <span style={{ opacity: 0.3, fontSize: 18 }}>→</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ARTICLE VIEW
  if (view === "article" && article) {
    return (
      <div style={{ fontFamily: "'Crimson Pro', Georgia, serif", background: "#081e36", minHeight: "100vh", color: "#e0dbd2" }}>
        <div style={{ background: `linear-gradient(135deg, ${article.color}, ${article.color}cc)`, padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 10 }}>
          <button onClick={() => setView("library")} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>← Geri</button>
          <span style={{ fontSize: 22 }}>{article.icon}</span>
          <div><div style={{ fontSize: 10, opacity: 0.7, textTransform: "uppercase" }}>{article.level}</div><div style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>{article.titleTr}</div></div>
        </div>
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "18px 14px 40px" }}>
          <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 12, padding: "16px 18px", marginBottom: 16 }}>
            <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 4 }}>{article.title}</div>
            <div style={{ fontSize: 14, opacity: 0.6 }}>{article.titleTr}</div>
          </div>
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, opacity: 0.6, marginBottom: 16, cursor: "pointer" }}>
            <input type="checkbox" checked={showPron} onChange={(e) => setShowPron(e.target.checked)} /> Okunuş göster
          </label>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {article.paragraphs.map((p, pi) => (
              <div key={pi} onClick={() => toggleTr(`art${pi}`)} style={{ padding: "14px 16px", background: "rgba(255,255,255,0.03)", borderRadius: 10, cursor: "pointer", borderLeft: `3px solid ${article.color}`, transition: "all 0.2s" }}>
                <div style={{ fontSize: 16, fontWeight: 600, lineHeight: 1.8 }}>{p.gr}</div>
                {showPron && <div style={{ fontSize: 13, opacity: 0.4, fontStyle: "italic", lineHeight: 1.7, marginTop: 6 }}>{p.pron}</div>}
                {showTr[`art${pi}`] && <div style={{ fontSize: 14, color: "#FFD54F", marginTop: 10, paddingTop: 10, borderTop: "1px solid rgba(255,255,255,0.1)", lineHeight: 1.7 }}>🇹🇷 {p.tr}</div>}
              </div>
            ))}
          </div>
          <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, opacity: 0.4 }}>Çeviri için paragraflara tıklayın</div>
        </div>
      </div>
    );
  }

  // DICTIONARY VIEW
  if (view === "dictionary") {
    const currentVocab = filteredVocabulary[currentCard];
    return (
      <div style={{ fontFamily: "'Crimson Pro', Georgia, serif", background: "#081e36", minHeight: "100vh", color: "#e0dbd2" }}>
        <div style={{ background: "linear-gradient(135deg, #FFD54F, #FFA000)", padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 10 }}>
          <button onClick={() => { setView("home"); setFlashcardMode(false); }} style={{ background: "rgba(0,0,0,0.2)", border: "none", color: "#333", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>← Geri</button>
          <span style={{ fontSize: 22 }}>📚</span>
          <div style={{ flex: 1 }}><div style={{ fontSize: 16, fontWeight: 700, color: "#333" }}>Sözlük</div><div style={{ fontSize: 11, color: "#555" }}>{filteredVocabulary.length} kelime</div></div>
          <button onClick={() => { setFlashcardMode(!flashcardMode); setCurrentCard(0); setShowAnswer(false); }} style={{ background: flashcardMode ? "#333" : "rgba(0,0,0,0.2)", border: "none", color: flashcardMode ? "#FFD54F" : "#333", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>{flashcardMode ? "📋 Liste" : "🎴 Flashcard"}</button>
        </div>
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "18px 14px 40px" }}>
          <input type="text" placeholder="Ara..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} style={{ width: "100%", padding: "12px 16px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.05)", color: "#fff", fontSize: 14, marginBottom: 10 }} />
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
            <button onClick={() => setSelectedCategory("all")} style={{ padding: "6px 12px", borderRadius: 20, border: "none", background: selectedCategory === "all" ? "#FFD54F" : "rgba(255,255,255,0.1)", color: selectedCategory === "all" ? "#333" : "#fff", fontSize: 12, cursor: "pointer" }}>Tümü</button>
            {categories.map(cat => (<button key={cat} onClick={() => setSelectedCategory(cat)} style={{ padding: "6px 12px", borderRadius: 20, border: "none", background: selectedCategory === cat ? "#FFD54F" : "rgba(255,255,255,0.1)", color: selectedCategory === cat ? "#333" : "#fff", fontSize: 12, cursor: "pointer" }}>{CATEGORIES[cat] || cat}</button>))}
          </div>
          {flashcardMode && filteredVocabulary.length > 0 ? (
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 12, opacity: 0.5, marginBottom: 16 }}>{currentCard + 1} / {filteredVocabulary.length}</div>
              <div onClick={() => setShowAnswer(!showAnswer)} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 16, padding: "40px 30px", minHeight: 200, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", cursor: "pointer", border: "2px solid rgba(255,255,255,0.1)" }}>
                <div style={{ fontSize: 32, fontWeight: 700, marginBottom: 10 }}>{currentVocab.gr}</div>
                <div style={{ fontSize: 14, opacity: 0.5, fontStyle: "italic", marginBottom: 20 }}>{currentVocab.pron}</div>
                {showAnswer ? <div style={{ fontSize: 20, color: "#FFD54F", fontWeight: 600 }}>🇹🇷 {currentVocab.tr}</div> : <div style={{ fontSize: 14, opacity: 0.3 }}>Cevabı görmek için tıkla</div>}
              </div>
              <div style={{ display: "flex", gap: 16, justifyContent: "center", marginTop: 20 }}>
                <button onClick={prevCard} style={{ padding: "12px 24px", background: "rgba(255,255,255,0.1)", border: "none", borderRadius: 8, color: "#fff", fontSize: 16, cursor: "pointer" }}>← Önceki</button>
                <button onClick={nextCard} style={{ padding: "12px 24px", background: "#FFD54F", border: "none", borderRadius: 8, color: "#333", fontSize: 16, fontWeight: 600, cursor: "pointer" }}>Sonraki →</button>
              </div>
            </div>
          ) : (
            <div>{filteredVocabulary.map((v, i) => (<div key={i} onClick={() => toggleTr(`dict${i}`)} style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, padding: "11px 12px", background: i % 2 === 0 ? "rgba(255,255,255,0.04)" : "transparent", borderRadius: 8, cursor: "pointer", borderLeft: "3px solid #FFD54F", marginBottom: 2 }}><div><div style={{ fontSize: 15, fontWeight: 700 }}>{v.gr}</div><div style={{ fontSize: 11, opacity: 0.45, fontStyle: "italic" }}>{v.pron}</div></div><div style={{ textAlign: "right", fontSize: 13, color: showTr[`dict${i}`] ? "#FFD54F" : "rgba(255,255,255,0.25)", alignSelf: "center" }}>{showTr[`dict${i}`] ? v.tr : "tıkla →"}</div></div>))}</div>
          )}
        </div>
      </div>
    );
  }

  // WEEK VIEW
  const tabs = [{ key: "vocab", label: "📝 Kelimeler" }, { key: "dialogue", label: "💬 Diyaloglar" }, { key: "reading", label: "📖 Okuma" }, { key: "grammar", label: "📐 Gramer" }];
  if (week?.numbers) tabs.splice(1, 0, { key: "numbers", label: "🔢 Sayılar" });

  return (
    <div style={{ fontFamily: "'Crimson Pro', Georgia, serif", background: "#081e36", minHeight: "100vh", color: "#e0dbd2" }}>
      <div style={{ background: `linear-gradient(135deg, ${week.color}, ${week.color}cc)`, padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 10 }}>
        <button onClick={() => setView("home")} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>← Geri</button>
        <span style={{ fontSize: 22 }}>{week.icon}</span>
        <div><div style={{ fontSize: 10, opacity: 0.65, textTransform: "uppercase" }}>{week.id}. Hafta</div><div style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{week.title}</div></div>
      </div>
      <div style={{ display: "flex", gap: 2, padding: "10px 14px 0", overflowX: "auto", background: "#0b2341" }}>
        {tabs.map((t) => (<button key={t.key} onClick={() => setActiveTab(t.key)} style={{ padding: "9px 12px", border: "none", borderRadius: "8px 8px 0 0", cursor: "pointer", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap", background: activeTab === t.key ? "#112d50" : "transparent", color: activeTab === t.key ? "#fff" : "rgba(255,255,255,0.45)", borderBottom: activeTab === t.key ? `2px solid ${week.color}` : "2px solid transparent" }}>{t.label}</button>))}
      </div>
      <div style={{ maxWidth: 760, margin: "0 auto", padding: "18px 14px 40px" }}>
        {activeTab === "vocab" && (<div><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}><h3 style={{ margin: 0, fontSize: 15 }}>Kelimeler ({week.vocabulary.length})</h3><label style={{ fontSize: 11, opacity: 0.6, display: "flex", alignItems: "center", gap: 5, cursor: "pointer" }}><input type="checkbox" checked={showPron} onChange={(e) => setShowPron(e.target.checked)} /> Okunuş</label></div>{week.vocabulary.map((v, i) => (<div key={i} onClick={() => toggleTr(`v${i}`)} style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, padding: "11px 12px", background: i % 2 === 0 ? "rgba(255,255,255,0.04)" : "transparent", borderRadius: 8, cursor: "pointer", borderLeft: `3px solid ${week.color}`, marginBottom: 2 }}><div><div style={{ fontSize: 15, fontWeight: 700 }}>{v.gr}</div>{showPron && <div style={{ fontSize: 11, opacity: 0.45, fontStyle: "italic" }}>{v.pron}</div>}</div><div style={{ textAlign: "right", fontSize: 13, color: showTr[`v${i}`] ? "#FFD54F" : "rgba(255,255,255,0.25)", alignSelf: "center" }}>{showTr[`v${i}`] ? v.tr : "tıkla →"}</div></div>))}</div>)}
        {activeTab === "numbers" && week.numbers && (<div><h3 style={{ margin: "0 0 14px", fontSize: 15 }}>Sayılar</h3><div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(100px, 1fr))", gap: 8 }}>{week.numbers.map((n, i) => (<div key={i} style={{ padding: "12px", background: "rgba(255,255,255,0.04)", borderRadius: 10, textAlign: "center" }}><div style={{ fontSize: 22, fontWeight: 700, color: week.color }}>{n.tr}</div><div style={{ fontSize: 15, fontWeight: 600, marginTop: 3 }}>{n.gr}</div>{showPron && <div style={{ fontSize: 11, opacity: 0.45, fontStyle: "italic" }}>{n.pron}</div>}</div>))}</div></div>)}
        {activeTab === "dialogue" && (<div style={{ display: "flex", flexDirection: "column", gap: 20 }}>{week.dialogues.map((d, di) => (<div key={di} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 12, overflow: "hidden" }}><div style={{ background: `linear-gradient(135deg, ${week.color}, ${week.color}bb)`, padding: "12px 14px" }}><div style={{ fontSize: 15, fontWeight: 700, color: "#fff" }}>{d.title}</div><div style={{ fontSize: 11, opacity: 0.8, color: "#fff" }}>📍 {d.setting}</div></div><div style={{ padding: "10px 12px", display: "flex", flexDirection: "column", gap: 6 }}>{d.lines.map((l, li) => { const isYou = l.speaker === "Siz"; return (<div key={li} onClick={() => toggleTr(`d${di}l${li}`)} style={{ padding: "9px 11px", borderRadius: 8, cursor: "pointer", background: isYou ? "rgba(13,94,175,0.15)" : "rgba(255,255,255,0.03)", borderLeft: `3px solid ${isYou ? "#0D5EAF" : "rgba(255,255,255,0.12)"}` }}><div style={{ fontSize: 10, fontWeight: 700, opacity: 0.5, marginBottom: 3, textTransform: "uppercase" }}>{l.speaker}</div><div style={{ fontSize: 14, fontWeight: 600, lineHeight: 1.5 }}>{l.gr}</div>{showPron && <div style={{ fontSize: 11, opacity: 0.4, fontStyle: "italic", marginTop: 1 }}>{l.pron}</div>}{showTr[`d${di}l${li}`] && <div style={{ fontSize: 12, color: "#FFD54F", marginTop: 4, paddingTop: 4, borderTop: "1px solid rgba(255,255,255,0.08)" }}>🇹🇷 {l.tr}</div>}</div>); })}</div></div>))}</div>)}
        {activeTab === "reading" && (<div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 12, overflow: "hidden" }}><div style={{ background: `linear-gradient(135deg, ${week.color}, ${week.color}99)`, padding: "16px 18px" }}><div style={{ fontSize: 10, opacity: 0.7, color: "#fff", textTransform: "uppercase" }}>Okuma — {week.reading.level}</div><div style={{ fontSize: 18, fontWeight: 700, color: "#fff", marginTop: 3 }}>{week.reading.title}</div><div style={{ fontSize: 13, opacity: 0.8, color: "#fff" }}>{week.reading.titleTr}</div></div><div style={{ padding: "14px 16px", display: "flex", flexDirection: "column", gap: 12 }}>{week.reading.paragraphs.map((p, pi) => (<div key={pi} onClick={() => toggleTr(`r${pi}`)} style={{ padding: "12px 14px", background: "rgba(255,255,255,0.03)", borderRadius: 8, cursor: "pointer", borderLeft: `3px solid ${week.color}` }}><div style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.7 }}>{p.gr}</div>{showPron && <div style={{ fontSize: 12, opacity: 0.4, fontStyle: "italic", lineHeight: 1.6, marginTop: 4 }}>{p.pron}</div>}{showTr[`r${pi}`] && <div style={{ fontSize: 13, color: "#FFD54F", marginTop: 8, paddingTop: 8, borderTop: "1px solid rgba(255,255,255,0.08)", lineHeight: 1.6 }}>🇹🇷 {p.tr}</div>}</div>))}</div></div>)}
        {activeTab === "grammar" && (<div><h3 style={{ margin: "0 0 14px", fontSize: 15 }}>📐 Gramer Notları</h3>{week.grammar.map((g, i) => (<div key={i} style={{ padding: "12px 14px", background: i % 2 === 0 ? "rgba(255,255,255,0.04)" : "transparent", borderRadius: 8, fontSize: 13, lineHeight: 1.7, borderLeft: `3px solid ${week.color}`, marginBottom: 4 }}>{g}</div>))}</div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
